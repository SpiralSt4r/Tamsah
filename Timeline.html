<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Aref+Ruqaa:wght@400;700&family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Gulzar&family=New+Tegomin&display=swap" rel="stylesheet">
<style>
  html {
        scroll-behavior: smooth;
    }

   body {
       font-family: "Amiri", serif;
       direction: rtl;
       unicode-bidi: plaintext; 
       background: #d1c3b4;
       background-image: repeating-linear-gradient(
       0deg,
       #7e3c3c11,
       #7e3c3c11 2px,
       transparent 2px,
       transparent 9px
       );
      background-attachment: fixed;
      p {
         font-family: "Lateef", serif;
        font-weight: bold;
      }
    }

    header {
    h1 {
     font-family:  'Gulzar', Helvetica, sans-serif; 
     text-align: center; 
     font-size: 50px;
     margin-top: -10px;
     margin-bottom: -10px;
     }
     p {
       text-align: center; 
        word-spacing: 0.6em; 
        margin-top: -20px; 
        color: #7e3c3c;
     }
     img {
       display: block;
       margin-left: auto;
       margin-right: auto;
       padding: 10px;
       position: relative;
       z-index: 1;
     }
    }

    .timeline {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 300px;
      margin: 0 auto;
  }

    .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
    }
    .line {
        width: 4px;
        height: 60px;
    }

    .info {
        text-align: center;
        padding: 1px 0;
        p {
           margin: 2px 0;
           color: #7e3c3c;
        }
        h2 {
            margin: -1px 0;
        }
    }
    img {
            width: 200px;
            margin: 8px;
            border: 2px solid #7e3c3c;
            border-radius: 20px;
        }

</style>
</head>
<body>
    <header>
           <a href="index.html">
              <img src="door.gif" alt="return" style="width:60px;height:60px; border: none;">
           </a>
    <h1>المواسم</h1>
    <p style="margin-bottom: 4px;  font-family: 'Amiri', serif;">  الموسم الحالي  ✶ الموسم الأول </p>
    </header>
    <div class="timeline">

      
      <div class="info">
          <p> 2026 </p>
          <h2> الموسم الأول </h2>
          <p> لم يتم الحسم </p>
          <img src="unknown.gif" style="border: 3px dashed #7e3c3c;">
      </div>
    
      <div class="line" style="background: #7e3c3c;  margin-top: -20px; "></div>
      <div class="dot" style="background: #7e3c3c; margin-bottom: 10px; "></div>
      <div class="info">
          <p> ١٤٤٨هـ </p>
          <h2> الموسم الأول </h2>
          <p> لا يوجد فائز </p>
      </div> 
      <div class="dot" style="background: #7e3c3c; margin-top: 10px;"></div>
      <div class="line" style="background: #7e3c3c;  margin-bottom: -20px; "></div>
       <img src="unknown.gif" style="border: 3px dashed #7e3c3c;">

    </div>
      <audio id="Sound1" preload="auto">
  <source src="sound-4.mp3" type="audio/mpeg">
</audio>

  <script>
        window.addEventListener('DOMContentLoaded', () => {
            const sound = document.getElementById('Sound1');
            sound.currentTime = 0;
            sound.play().catch(err => {
                console.warn("Audio playback was blocked:", err);
            });
        });
    </script>
</body>
</html>
