<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curtain Animation</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    /* Container for the curtain */
    .curtain {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
    }

    /* Left and right panels */
    .panel {
        position: absolute;
        top: 0;
        width: 50%;
        height: 100%;
        background: rgb(66, 35, 41);
        transition: transform 1.5s ease-in-out;
        z-index: 2;
    }

    .left {
        left: 0;
        transform: translateX(0);
    }

    .right {
        right: 0;
        transform: translateX(0);
    }

    /* Content behind the curtain */
    .content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('https://picsum.photos/1200/800') center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        z-index: 1;
    }

    /* When curtain opens */
    .open .left {
        transform: translateX(-100%);
    }

    .open .right {
        transform: translateX(100%);
    }
</style>
</head>
<body>

<div class="curtain" id="curtain">
    <div class="panel left"></div>
    <div class="panel right"></div>
    <div class="content">
        🎭 Welcome to the Show!
    </div>
</div>

<script>
    // Automatically open curtain after 1 second
    window.onload = function() {
        setTimeout(() => {
            document.getElementById('curtain').classList.add('open');
        }, 1000);
    };
</script>

</body>
