    <style> 

    html {
        scroll-behavior: smooth;
    }
    body {
        position: relative;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: "Amiri", serif;
         background: linear-gradient(to bottom, #F5F0E8, #F5F0E8, #d4c9b0aa);
    }
    body::before {
        content: '';
        position: fixed;
        top: 0; bottom: 0;
        right: 0;
        width: 60px;
        background: linear-gradient(to left, #D4C9B0, #F5F0E8, #D4C9B0);
        border-left: 2px solid #C4B898;
        z-index: 0;
    }
    body::after {
        content: '';
        position: fixed;
        top: 0; bottom: 0;
        left: 0;
        width: 60px;
        background: linear-gradient(to right, #D4C9B0, #F5F0E8, #D4C9B0);
        border-right: 2px solid #C4B898;
        z-index: 0;
    }
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: black;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeOut 1.5s ease forwards;
    animation-delay: 1s;
}
@keyframes fadeOut {
    from { opacity: 1; pointer-events: all;}
    to { opacity: 0; visibility: hidden; pointer-events: none;}
}
